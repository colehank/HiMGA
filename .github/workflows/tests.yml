name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 2 * * *"   # nightly at 02:17 UTC
  workflow_dispatch:
    inputs:
      run_slow:
        description: "Include slow tests (loads large ML models)"
        type: boolean
        default: false

jobs:
  # ── Fast tests ─────────────────────────────────────────────────────────────
  # Runs on every push / PR.  Skips @slow and @integration by default.
  test-fast:
    name: Fast tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Download NLTK corpora
        run: |
          uv run python -c "
          import nltk
          nltk.download('punkt_tab', quiet=True)
          nltk.download('wordnet', quiet=True)
          "

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Run fast tests
        run: uv run pytest tests/ -v

  # ── Slow tests ─────────────────────────────────────────────────────────────
  # Runs nightly (schedule) or manually via workflow_dispatch.
  # Loads BERTScore / Sentence-BERT models; uses HuggingFace cache.
  test-slow:
    name: Slow tests (nightly)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_slow == true)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Download NLTK corpora
        run: |
          uv run python -c "
          import nltk
          nltk.download('punkt_tab', quiet=True)
          nltk.download('wordnet', quiet=True)
          "

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      - name: Run slow tests
        run: uv run pytest tests/ -v --run-slow
