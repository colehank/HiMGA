name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Download NLTK corpora
        run: |
          uv run python -m nltk.downloader punkt_tab wordnet
          uv run python -c "
          import nltk
          nltk.data.find('tokenizers/punkt_tab')
          from nltk.corpus import wordnet; wordnet.ensure_loaded()
          print('NLTK data OK')
          "

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Run tests
        run: uv run pytest tests/ -v
